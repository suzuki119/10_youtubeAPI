<!DOCTYPE html>
<html>

<head>
    <style>
        #player-wrapper {
            position: relative;
            width: 1000px;
            height: 500px;
        }

        #comment-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 10;
        }

        .comment-bullet {
            position: absolute;
            white-space: nowrap;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px #000, -1px -1px 2px #000;
            animation: flow linear forwards;
        }

        @keyframes flow {
            from {
                left: 100%;
            }

            to {
                left: -110%;
            }
        }
    </style>
</head>

<body>
    <!-- 1. The <iframe> (and video player) will replace this <div> tag. -->
    <!-- 1. ここの<div>タグがYoutubeの<iframe>に置き換わる。 -->
    <form>
        <input type="search" id="ytSearch" value="TRiDENT" />
        <button id="searchBtn">検索</button>
    </form>
    <div id="player-wrapper">
        <div id="player"></div>
        <div id="comment-overlay"></div>
    </div>
    <button id="commentBtn">コメントを流す</button>
    <!-- 動画が表示されている<div>の下に追加 -->
    <nav>
        <ul>
            <li id="doplay">再生</li>
            <li id="dopause">一時停止</li>
            <li id="dostop">再生終了</li>
            <li id="mute">ミュート</li>
            <li id="do10sNext">10秒先へ</li>
            <li id="do10sPrev">10秒戻る</li>
            <li id="dovolume">
                <label>音量
                    <input type="range" min="0" max="100" name="volume" id="volume" var="50">
                    <span id="volumetext">音量</span>
                </label>
            </li>

            <li id="doquality"><label>画質
                    <select id="quality">
                        <option value="small">240p</option>
                        <option value="medium">360p</option>
                        <option value="large">480p</option>
                        <option value="hd720">720p</option>
                        <option value="hd1080">1080p</option>
                    </select>
                </label></li>


            <li>
                <select id="MovieId" class="ytMovie" name="ytMovie">
                    <option value="Wdjh81uH6FU">選択してください。</option>
                </select>
            </li>

            <li>
                <label>スピード
                    <input type="range" min="0.25" max="2" name="speed" id="speed" var="1" step="0.25">
                    <span id="speedtext">スピード</span>
                </label>
            </li>



        </ul>
    </nav>

    <script>
        // 2. This code loads the IFrame Player API code asynchronously.
        // 2. 変数tagにscriptタグを作って入れる。Element=要素、Attrubute=属性
        var tag = document.createElement('script');

        tag.src = 'https://www.youtube.com/iframe_api';
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // 3. This function creates an <iframe> (and YouTube player)
        //    after the API code downloads.
        // 3. APIのコードを読み込んでから、この関数を<iframe>内に影響させる。

        var player;
        let youtubeId = 'Wdjh81uH6FU'//Mr.beast
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '500',
                width: '1000',
                videoId: youtubeId,
                playerVars: {
                    //③パラメータの設定
                    playsinline: 1,
                    controls: 0
                },
                events: {
                    onReady: onPlayerReady,
                    //onStateChange: onPlayerStateChange
                }
            });
        }

        // 4. The API will call this function when the video player is ready.
        // 4. このAPIは、video playderが準備でしたら、この関数を呼び出します。
        function onPlayerReady(event) {
            event.target.playVideo(); //①最初の再生を止める
            let currentVol = 5; //②最初のボリュームを設定（0〜100）
            event.target.setVolume(currentVol); //③Playerのボリュームに設定
            document.querySelector('#volume').value = currentVol; //④rangeFormに音量を設定
            document.querySelector('#volumetext').textContent = currentVol; //⑤テキストにも音量を数値で表示
            player.stopVideo();
        }

        // 5. The API calls this function when the player's state changes.
        //    The function indicates that when playing a video (state=1),
        //    the player should play for six seconds and then stop.
        /* 5. video playerのステート（状態）が変更されたら、この関数を呼び出す。
      動画を再生するときの設定は、state=1にしておきます。
      プレイヤーは、6000ミリ秒後に終了します。 */
        var done = false;
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING && !done) {
                setTimeout(stopVideo, 6000);
                done = true;
            }
        }

        //一時停止関数
        function pauseTheVideo() {
            player.pauseVideo();
        }

        //一時停止イベント
        const dopauseBtn = document.querySelector('#dopause');
        dopauseBtn.addEventListener('click', function () {
            pauseTheVideo();
        });

        //ミュート関数
        function onMute() {
            //ミュートの時、trueを返すのでミュートを解除します。
            if (player.isMuted()) {
                player.unMute();
            } else {
                //ミュートが解除されている時はfalseなので、ミュートにします。
                player.mute();
            }
        }

        //ミュートイベント
        const onMuteBtn = document.querySelector('#mute');
        onMuteBtn.addEventListener('click', function () {
            onMute();
            if (onMuteBtn.innerText === 'ミュート') {
                onMuteBtn.innerText = 'ミュート解除';
            } else {
                onMuteBtn.innerText = 'ミュート';
            }
        });


        //10秒前にの関数
        function onePrev() {
            let currentTime = player.getCurrentTime();
            player.seekTo(currentTime - 10);
        }

        //10秒後にの関数
        function oneNext() {
            let currentTime = player.getCurrentTime();
            player.seekTo(currentTime + 10);
        }

        //10秒前へイベント
        const onePrevBtn = document.querySelector('#do10sPrev');
        onePrevBtn.addEventListener('click', function () {
            onePrev();
        });

        //10秒後へイベント
        const oneNextBtn = document.querySelector('#do10sNext');
        oneNextBtn.addEventListener('click', function () {
            oneNext();
        });

        //再生関数
        function startVideo() {
            player.playVideo();//youtube.apiの関数
        }

        //停止関数
        function stopVideo() {
            player.stopVideo();//youtube.apiの関数
        }

        const startBtn = document.querySelector('#doplay');
        startBtn.addEventListener("click", function () {
            startVideo();
        });
        const stopBtn = document.querySelector('#dostop');
        stopBtn.addEventListener("click", function () {
            stopVideo();
        });


        //volume
        function volume(vol) {
            let currentVol = player.getVolume();
            player.setVolume(vol);
        };

        const volumeBtn = document.querySelector('#volume');
        const volumeTxt = document.querySelector("#volumetext");

        volumeBtn.addEventListener("input", function () {
            volume(this.value);
            volumeTxt.textContent = this.value;
        });


        const qualityBtn = document.querySelector('#quality');
        qualityBtn.addEventListener("change", function () {
            player.setPlaybackQuality(this.value);
            console.log(this.value);
        });

        //動画切り替えイベント
        let movieid = document.querySelector('#MovieId');
        movieid.addEventListener('change', function () {
            youtubeId = movieid.value;
            //プレイヤー削除
            player.destroy();
            onYouTubeIframeAPIReady();
        });

        function speed(vol) {
            player.setPlaybackRate(vol);
        };

        const SpeedBtn = document.querySelector('#speed');
        const speedTxt = document.querySelector("#speedtext");

        SpeedBtn.addEventListener("input", function () {
            speed(parseFloat(this.value));
            speedTxt.textContent = this.value;
        });


    </script>
    <script>
        const USE_LOCAL = true; // 開発中はtrue、本番APIを叩きたいときはfalse
        const searchvideo = document.querySelector(".ytMovie")
        const selectvideo = document.querySelector(".searchlist");


        const ytSearchBtn = document.querySelector("#searchBtn");
        ytSearchBtn.addEventListener('click', function (e) {

            e.preventDefault();

            const ytSearchVal = document.querySelector('#ytSearch').value;
            console.log(ytSearchVal);
            ytSearch(ytSearchVal); // ← これを追加
        });

        function ytSearch(val) {
            const key = "ここにAPIキーを入れる";
            const num = 10;
            const part = 'snippet';
            const type = 'video';
            const query = val;

            //youtubeapiエンドポイント
            const apiUrl = `https://www.googleapis.com/youtube/v3/search?type=${type}&part=${part}&maxResults=${num}&key=${key}&q=${query}&playsinline=1`;
            const localUrl = './data/sample.json';

            fetch(USE_LOCAL ? localUrl : apiUrl)//参考演算子
                .then((data) => data.json())
                .then((obj) => {
                    //現在入っている<option>を全て削除
                    console.log(obj);
                    for (let movie of obj["items"]) {
                        //各videoIdとタイトルを取得して変数に代入
                        const ytId = movie["id"]["videoId"];
                        const ytTitle = movie["snippet"]["title"];
                        //optionを作成して、videoIdとtitleを所定の場所に設置し、要素を追加していく。
                        const optionTag = document.createElement('option');
                        optionTag.textContent = ytTitle;
                        optionTag.setAttribute('value', ytId);
                        searchvideo.appendChild(optionTag);
                    }
                });
        }
    </script>
    <script>
        const key = "ここにAPIキーを入れる";
        const overlay = document.getElementById('comment-overlay');
        const lanes = 10; // コメントの縦位置レーン数
        const laneHeight = 500 / lanes;

        function fetchComments(videoId) {

            const localUrl = './data/comments.json';

            const apiUrl = `https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${videoId}&maxResults=20&key=${key}`;

            fetch(USE_LOCAL ? localUrl : apiUrl)
                .then(res => res.json())
                .then(obj => {
                    console.log(obj);
                    if (obj.error) {
                        console.error('コメント取得エラー:', obj.error.message);
                        return;
                    }

                    const comments = obj.items.map(item =>
                        item.snippet.topLevelComment.snippet.textDisplay
                    );
                    shootComments(comments);
                })
                .catch(err => console.error('fetch失敗:', err));
        }

        function shootComments(comments) {
            overlay.innerHTML = '';
            comments.forEach((text, i) => {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'comment-bullet';
                    el.textContent = text;

                    const lane = i % lanes;
                    const topPx = lane * laneHeight + (laneHeight / 2) - 12;
                    const duration = 5 + Math.random() * 3; // 5〜8秒
                    const colors = ['#fff', '#ffff00', '#00ffff', '#ff88cc', '#88ff88'];
                    el.style.top = topPx + 'px';
                    el.style.animationDuration = duration + 's';
                    el.style.color = colors[i % colors.length];

                    overlay.appendChild(el);

                    el.addEventListener('animationend', () => el.remove());
                }, i * 400); // 400msずつずらして流す
            });
        }

        document.getElementById('commentBtn').addEventListener('click', () => {
            fetchComments(youtubeId);
        });

        // 動画切り替え時にも自動でコメントを取得
        document.querySelector('#MovieId').addEventListener('change', function () {
            fetchComments(this.value);
        });
    </script>
</body>

</html>
